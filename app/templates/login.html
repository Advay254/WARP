<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evolution API — Login</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#0a0f0a;font-family:'Segoe UI',system-ui,sans-serif;color:#e2e8e2}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 70% 60% at 15% 40%,rgba(34,197,94,.09) 0%,transparent 65%),
                 radial-gradient(ellipse 50% 50% at 85% 65%,rgba(59,130,246,.07) 0%,transparent 65%);
      pointer-events:none;z-index:0}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:52px 44px;
      width:100%;max-width:420px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,.6)}
    .logo{display:flex;align-items:center;gap:14px;margin-bottom:36px}
    .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#16a34a,#15803d);
      border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;
      box-shadow:0 0 24px rgba(22,163,74,.3)}
    .logo-text h1{font-size:1.25rem;font-weight:700;color:#f0fdf4;letter-spacing:-.02em}
    .logo-text p{font-size:.72rem;color:#4ade80;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
    h2{font-size:1.6rem;font-weight:600;margin-bottom:6px;color:#f0fdf4}
    .subtitle{font-size:.875rem;color:#6b7280;margin-bottom:30px}
    .field{margin-bottom:16px}
    label{display:block;font-size:.8rem;font-weight:500;color:#9ca3af;margin-bottom:6px}
    input{width:100%;padding:12px 16px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);border-radius:11px;color:#f0fdf4;
      font-size:.9rem;transition:all .2s;outline:none}
    input:focus{border-color:rgba(34,197,94,.5);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
    input::placeholder{color:#374151}
    .error-box{display:flex;align-items:center;gap:10px;padding:11px 15px;
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
      border-radius:9px;color:#fca5a5;font-size:.83rem;margin-bottom:20px}
    .btn{width:100%;padding:13px;margin-top:8px;
      background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:11px;
      color:#fff;font-size:.92rem;font-weight:600;cursor:pointer;
      transition:opacity .2s,transform .1s;letter-spacing:.02em;
      box-shadow:0 4px 20px rgba(22,163,74,.3)}
    .btn:hover{opacity:.92}
    .btn:active{transform:scale(.99)}
    .footer-note{margin-top:24px;font-size:.75rem;color:#374151;text-align:center}
    code{font-size:.72rem;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:#4ade80}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📱</div>
      <div class="logo-text">
        <h1>Evolution API</h1>
        <p>WhatsApp Gateway</p>
      </div>
    </div>
    <h2>Sign in</h2>
    <p class="subtitle">Access your WhatsApp management dashboard</p>
    {% if error %}
    <div class="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn" type="submit">Sign in →</button>
    </form>
    <p class="footer-note">Set <code>DASHBOARD_USERNAME</code> &amp; <code>DASHBOARD_PASSWORD</code> in Space secrets.</p>
  </div>
</body>
</html>
