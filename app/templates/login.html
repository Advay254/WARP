<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WARP — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c12;--s1:#0d1219;--s2:#111820;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
  --green:#22c55e;--green-d:#16a34a;--green-glow:rgba(34,197,94,.15);
  --text:#e8edf5;--text2:#a8b3c8;--text3:#616e85;
  --red:#ef4444;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg)}
body{
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:
    radial-gradient(ellipse 100% 70% at 0% 0%,rgba(34,197,94,.08),transparent 55%),
    radial-gradient(ellipse 80% 60% at 100% 100%,rgba(59,130,246,.06),transparent 50%);
}

.card{
  width:100%;max-width:380px;
  background:var(--s1);border:1px solid var(--border2);
  border-radius:20px;padding:36px 32px;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}

.brand{text-align:center;margin-bottom:32px}
.brand-icon{
  width:48px;height:48px;border-radius:14px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--green-d),var(--green));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 28px var(--green-glow);
}
.brand-name{font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:-.03em}
.brand-sub{font-size:.75rem;color:var(--text3);margin-top:4px;letter-spacing:.04em;text-transform:uppercase}

.field{margin-bottom:14px}
.field label{display:block;font-size:.76rem;color:var(--text2);font-weight:500;margin-bottom:6px}
.field input{
  width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:.85rem;font-family:var(--font);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field input:focus{border-color:rgba(34,197,94,.4);box-shadow:0 0 0 3px rgba(34,197,94,.08)}
.field input::placeholder{color:var(--text3)}

.error{
  display:flex;align-items:center;gap:8px;padding:10px 13px;
  background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);
  border-radius:9px;font-size:.79rem;color:#fca5a5;margin-bottom:14px;
}

.btn-login{
  width:100%;padding:11px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--green-d),var(--green));
  color:#fff;font-size:.87rem;font-weight:600;
  cursor:pointer;font-family:var(--font);
  transition:opacity .18s,box-shadow .18s;
  box-shadow:0 2px 14px rgba(34,197,94,.22);
  margin-top:4px;
}
.btn-login:hover{opacity:.88;box-shadow:0 4px 22px rgba(34,197,94,.32)}
.btn-login:active{transform:scale(.98)}

.footer{text-align:center;margin-top:22px;font-size:.72rem;color:var(--text3)}
.footer a{color:var(--green);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">💬</div>
    <div class="brand-name">WARP</div>
    <div class="brand-sub">WhatsApp Gateway</div>
  </div>

  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="Enter username" autocomplete="username" required/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required/>
    </div>
    <button class="btn-login" type="submit">Sign In →</button>
  </form>

  <div class="footer">
    WhatsApp Gateway · powered by Evolution API<br/>
    <a href="/health">System status</a>
  </div>
</div>
</body>
</html>
